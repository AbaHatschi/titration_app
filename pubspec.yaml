name: titration_app
description: >
  A professional Flutter application for titration calculations and management.
  Features Clean Architecture, MVVM pattern, and comprehensive error handling.
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  go_router: ^16.3.0
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  sembast: ^3.8.5+1
  shared_preferences: ^2.5.3

dev_dependencies:
  build_runner: ^2.10.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  go_router_builder: ^4.1.1
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

repository: https://github.com/AbaHatschi/titration_app
issue_tracker: https://github.com/AbaHatschi/titration_app/issues
homepage: https://github.com/AbaHatschi/titration_app
